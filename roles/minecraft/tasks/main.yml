---
- name: Configure Cloudflare DNS for Minecraft
  community.general.cloudflare_dns:
    zone: "{{ minecraft_root_domain }}"
    record: "{{ item.record }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    proxied: false
    api_token: "{{ cloudflare.api_token }}"
  loop:
    - { record: "{{ minecraft_sub_domain }}", type: "A", value: "{{ minecraft_ipv4 }}" }
    - { record: "*.{{ minecraft_sub_domain }}", type: "CNAME", value: "{{ minecraft_sub_domain }}.{{ minecraft_root_domain }}" }

- name: Create data subvolume
  community.general.btrfs_subvolume:
    name: "{{ minecraft_project_vol }}"
    state: present
    filesystem_device: "{{ minecraft_fsdev }}"

- name: Create directories
  ansible.builtin.file:
    path: "{{ item.value }}"
    state: directory
    mode: "0750"
  with_dict: "{{ minecraft_dirs }}"

- name: Create directories
  ansible.builtin.file:
    path: "{{ minecraft_dirs.velocity }}/{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - config
    - plugins

- name: Copy compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ minecraft_base_dir }}/compose.yml"
    mode: "0640"

- name: Copy velocity config
  ansible.builtin.template:
    src: velocity.toml.j2
    dest: "{{ minecraft_dirs.velocity }}/config/velocity.toml"
    mode: "0640"

- name: Copy velocity secret
  ansible.builtin.template:
    src: velocity.secret.j2
    dest: "{{ minecraft_dirs.velocity }}/config/forwarding.secret"
    mode: "0640"

- name: Download Velocity plugins
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ minecraft_dirs.velocity }}/plugins/{{ item.name }}.jar"
    mode: "0644"
    force: true
  loop:
    - name: geyser
      url: "https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/velocity"
    - name: floodgate
      url: "https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/velocity"
    - name: ambassador
      url: "https://github.com/adde0109/Ambassador/releases/latest/download/Ambassador-Velocity-1.4.5-all.jar"

- name: Create folder for Geyser
  ansible.builtin.file:
    path: "{{ minecraft_dirs.velocity }}/plugins/{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - Geyser-Velocity
    - floodgate

- name: Copy Geyser config
  ansible.builtin.template:
    src: geyser.yml.j2
    dest: "{{ minecraft_dirs.velocity }}/plugins/Geyser-Velocity/config.yml"
    mode: "0640"

- name: Copy floodgate key to velocity
  ansible.builtin.copy:
    src: "{{ minecraft_floodgate_key }}"
    dest: "{{ minecraft_dirs.velocity }}/plugins/floodgate/key.pem"
    mode: "0600"

- name: Create Minecraft server directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop: "{{ minecraft_server_dirs }}"

- name: Create folder for floodgate in crossplay server
  ansible.builtin.file:
    path: "{{ minecraft_server_dirs }}/crossplay/plugins/{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - floodgate

- name: Copy floodgate key file to crossplay server
  ansible.builtin.copy:
    src: "{{ minecraft_floodgate_key }}"
    dest: "{{ minecraft_server_dirs }}/crossplay/plugins/floodgate/key.pem"
    mode: "0600"

- name: Copy copyparty config
  ansible.builtin.template:
    src: copyparty.cfg.j2
    dest: "{{ minecraft_dirs.copyparty }}/copyparty.conf"
    mode: "0640"

- name: Copy caddyfile
  ansible.builtin.template:
    src: minecraft.caddy.j2
    dest: /etc/caddy/conf.d/minecraft.caddy
    owner: caddy
    group: caddy
    mode: "0644"
  notify: "reload caddy"

- name: Open tcp port for proxy
  community.general.ufw:
    rule: allow
    port: "{{ minecraft_ports.proxy }}"
    proto: "tcp"

- name: Open udp port for voice
  community.general.ufw:
    rule: allow
    port: "{{ minecraft_ports.voice }}"
    proto: "udp"

- name: Open Bedrock ports
  community.general.ufw:
    rule: allow
    port: "{{ minecraft_ports.bedrock }}"
    proto: "udp"

- name: Install tools for watcher
  ansible.builtin.apt:
    update_cache: true
    name:
      - inotify-tools
      - yq
      - curl
    state: present

- name: Install proxy fix script
  ansible.builtin.template:
    src: crafty_proxy_fix.sh.j2
    dest: "{{ minecraft_base_dir }}/crafty_proxy_fix.sh"
    owner: root
    group: root
    mode: "0755"
  notify:
    - Restart crafty watcher

- name: Install watcher script
  ansible.builtin.template:
    src: crafty_watch.sh.j2
    dest: "{{ minecraft_base_dir }}/crafty_watch.sh"
    owner: root
    group: root
    mode: "0755"
  notify:
    - Restart crafty watcher

- name: Install watcher service
  ansible.builtin.template:
    src: crafty_watch.service.j2
    dest: /etc/systemd/system/crafty_watch.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart crafty watcher

- name: Enable watcher service
  ansible.builtin.systemd:
    name: crafty_watch.service
    enabled: true
    state: started

- name: Bring stack up
  community.docker.docker_compose_v2:
    project_src: "{{ minecraft_base_dir }}"
    build: always
    recreate: always
    pull: always
    state: restarted
  register: minecraft_compose

- name: Verify stack is running
  ansible.builtin.assert:
    that:
      - crafty.State == 'running'
      - velocity.State == 'running'
      - copyparty.State == 'running'
  vars:
    crafty: >-
      {{ minecraft_compose.containers | selectattr("Service", "equalto", "crafty") | first }}
    velocity: >-
      {{ minecraft_compose.containers | selectattr("Service", "equalto", "velocity") | first }}
    copyparty: >-
      {{ minecraft_compose.containers | selectattr("Service", "equalto", "copyparty") | first }}
