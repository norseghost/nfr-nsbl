---
- name: Resolve latest version
  when: headscale_version == "latest"
  ansible.builtin.uri:
    url: https://api.github.com/repos/juanfont/headscale/releases/latest
    return_content: true
  register: headscale_latest

- name: Set resolved version
  ansible.builtin.set_fact:
    headscale_resolved_version: >-
      {{ headscale_latest.json.tag_name | regex_replace('^v','')
         if headscale_version == 'latest'
         else headscale_version }}

- name: Determine if install/update is needed
  ansible.builtin.set_fact:
    headscale_install_needed: >-
      {{ headscale_installed_version == ""
         or headscale_installed_version != headscale_resolved_version }}

- name: Download headscale deb
  when: headscale_install_needed
  ansible.builtin.get_url:
    url: "{{ headscale_repo_base }}/v{{ headscale_resolved_version }}/headscale_{{ headscale_resolved_version }}_linux_{{ headscale_arch }}.deb"
    dest: "/tmp/headscale_{{ headscale_resolved_version }}.deb"
    mode: "0644"
