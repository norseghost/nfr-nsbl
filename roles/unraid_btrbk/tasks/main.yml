- name: Ensure btrbk cron job is installed via go
  ansible.builtin.lineinfile:
    path: /boot/config/go
    insertafter: EOF
    line: |
      # btrbk cron
      echo "{{ cron_schedule }} {{ btrbk_command }} run" > /etc/cron/btrbk
    state: present
- name: Install btrbk cron job (runtime)
  ansible.builtin.copy:
    dest: /etc/cron.d/btrbk
    content: |
      {{ cron_schedule }} {{ btrbk_command }} run
    owner: root
    group: root
    mode: "0644"
- name: dry run planned backups
  ansible.builtin.command:
    cmd: "{{ btrbk_command }} dryrun"
  check_mode: false
  register: btrbk_output
  changed_when: false # Prevents the task from reporting "changed" every time

- name: Display btrbk dry run results
  ansible.builtin.debug:
    var: btrbk_output.stdout_lines
