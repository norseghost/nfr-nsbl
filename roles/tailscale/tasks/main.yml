---

- name: Download Tailscale GPG key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ ansible_facts.distribution | lower }}/{{ ansible_facts.distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'

- name: Add Tailscale repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/{{ ansible_facts.distribution | lower }} {{ ansible_facts.distribution_release }} main"
    state: present

- name: Install Tailscale package
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Ensure Tailscale service is enabled and started
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Get Tailscale Status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status_json
  changed_when: false
  # We expect this might fail if tailscaled is brand new
  failed_when: false

- name: Parse Tailscale Status
  ansible.builtin.set_fact:
    tailscale_status: "{{ tailscale_status_json.stdout | from_json }}"
  when: tailscale_status_json.rc == 0

- name: Determine if enrollment is needed
  ansible.builtin.set_fact:
    tailscale_needs_enrollment: >-
      {{
        tailscale_status_json.rc != 0 or
        tailscale_status.BackendState in ['NeedsLogin', 'LoggedOut'] or
        (tailscale_status.BackendState == 'NoState')
      }}

- name: Fetch Headscale User ID for {{ tailscale_user }}
  ansible.builtin.uri:
    url: "{{ headscale_url }}/api/v1/user?name={{ tailscale_user }}"
    method: GET
    headers:
      Authorization: "Bearer {{ headscale_api_key }}"
  register: tailscale_user_info
  delegate_to: localhost
  when: tailscale_needs_enrollment

- name: Validate Headscale User exists
  ansible.builtin.assert:
    that: "tailscale_user_info.json.users | length > 0"
    fail_msg: "User {{ tailscale_user }} was not found in Headscale."
  when: tailscale_needs_enrollment

- name: Generate Tailscale auth key
  ansible.builtin.uri:
    url: "{{ headscale_url }}/api/v1/preauthkey"
    method: POST
    headers:
      Authorization: "Bearer {{ headscale_api_key }}"
    body_format: json
    body:
      # Use the integer ID from the previous step, NOT the string name
      user: "{{ tailscale_user_info.json.users[0].id | int }}"
      expiration: "{{ '%Y-%m-%dT%H:%M:%SZ' | strftime( (ansible_facts.date_time.epoch | int) + 86400 ) }}"
    status_code: 200
  register: headscale_key_response
  delegate_to: localhost
  when: tailscale_needs_enrollment
  no_log: true

- name: Enroll system into Headscale
  ansible.builtin.command: >
    tailscale up
    --login-server {{ headscale_url }}
    --authkey {{ headscale_key_response.json.preAuthKey.key }}
    --accept-routes
    --reset
  when: tailscale_needs_enrollment
  changed_when: true
