---
- name: Pre flight tasks
  hosts: all
  gather_facts: true
  tasks:
    - name: Define shorthand for host ipv4
      ansible.builtin.set_fact:
        ipv4_addr: "{{ ansible_facts.default_ipv4.address }}"

- name: Common setup
  hosts: vps
  roles:
    - caddy

- name: Backup server
  hosts: backup
  roles:
    - backup

- name: Set up server nodes
  hosts: srv
- name: Set up headscale orchestrator
  hosts: vpn
  roles:
    - headscale
